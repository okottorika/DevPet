<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DevPet Speech</title>
  <link rel="icon" href="data:,">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: transparent;
      overflow: hidden;
      width: 100%;
      height: 100%;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      user-select: none;
    }

    #speech-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      width: 100%;
      height: 100%;
      padding-bottom: 0;
    }

    #speech-bubble {
      position: relative;
      background: rgba(30, 30, 30, 0.92);
      padding: 8px 12px;
      border-radius: 10px;
      max-width: 170px;
      text-align: center;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.4);
      animation: bubbleIn 0.3s ease-out;
    }

    #speech-bubble.hidden {
      display: none;
    }

    /* Arrow pointing down toward DevPet */
    #speech-bubble::after {
      content: '';
      position: absolute;
      bottom: -6px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 6px solid transparent;
      border-right: 6px solid transparent;
      border-top: 6px solid rgba(30, 30, 30, 0.92);
    }

    #speech-bubble-text {
      display: block;
      font-size: 11px;
      color: #4ade80;
      font-weight: bold;
      line-height: 1.3;
      margin-bottom: 4px;
    }

    #speech-bubble-tip {
      display: block;
      font-size: 9px;
      color: #a0a0a0;
      line-height: 1.3;
      margin-bottom: 6px;
    }

    #speech-bubble-dismiss {
      padding: 3px 10px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 10px;
      background: #3a3a3a;
      color: #e0e0e0;
      transition: background 0.2s;
    }

    #speech-bubble-dismiss:hover {
      background: #555;
    }

    @keyframes bubbleIn {
      from {
        opacity: 0;
        transform: translateY(8px) scale(0.9);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }
  </style>
</head>
<body>
  <div id="speech-container">
    <div id="speech-bubble" class="hidden">
      <span id="speech-bubble-text"></span>
      <span id="speech-bubble-tip"></span>
      <button id="speech-bubble-dismiss">Got it!</button>
    </div>
  </div>

  <script type="module" src="speech-bubble.js"></script>
</body>
</html>

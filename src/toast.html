<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DevPet Notifications</title>
  <link rel="icon" href="data:,">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: transparent;
      overflow: hidden;
      width: 100%;
      height: 100%;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      user-select: none;
    }

    #toast-container {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
      height: 100%;
      padding: 12px;
      justify-content: flex-end;
    }

    /* When positioned at top, stack from top down */
    #toast-container.position-top {
      justify-content: flex-start;
    }

    .toast {
      position: relative;
      overflow: hidden;
      background: linear-gradient(135deg, rgba(30, 30, 36, 0.95) 0%, rgba(24, 24, 30, 0.98) 100%);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-left: 4px solid var(--accent, #4ade80);
      border-radius: 12px;
      padding: 14px 16px;
      box-shadow:
        0 8px 32px rgba(0, 0, 0, 0.4),
        0 2px 8px rgba(0, 0, 0, 0.3),
        inset 0 1px 0 rgba(255, 255, 255, 0.05),
        0 0 20px var(--glow, rgba(74, 222, 128, 0.1));
      animation: toastSlideIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      opacity: 0;
      max-width: 100%;
      backdrop-filter: blur(16px);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .toast:hover {
      transform: translateX(-4px);
      box-shadow:
        0 12px 40px rgba(0, 0, 0, 0.5),
        0 4px 12px rgba(0, 0, 0, 0.3),
        inset 0 1px 0 rgba(255, 255, 255, 0.08),
        0 0 30px var(--glow, rgba(74, 222, 128, 0.15));
    }

    .toast.exit {
      animation: toastSlideOut 0.25s cubic-bezier(0.4, 0, 1, 1) forwards;
    }

    .toast-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
    }

    .toast-icon {
      font-size: 20px;
      flex-shrink: 0;
      filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.3));
    }

    .toast-title {
      font-size: 14px;
      font-weight: 600;
      color: #f0f0f0;
      line-height: 1.3;
      letter-spacing: 0.01em;
      flex: 1;
    }

    .toast-close {
      width: 20px;
      height: 20px;
      border: none;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 6px;
      color: #808080;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s ease;
      flex-shrink: 0;
    }

    .toast-close:hover {
      background: rgba(255, 255, 255, 0.15);
      color: #e0e0e0;
    }

    .toast-body {
      font-size: 12px;
      color: #a8a8b0;
      line-height: 1.5;
      padding-left: 30px;
    }

    .toast-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 10px;
      padding-left: 30px;
    }

    .toast-brand {
      font-size: 9px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.25);
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }

    .toast-progress-container {
      position: absolute;
      bottom: 0;
      left: 4px;
      right: 0;
      height: 3px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 0 0 12px 0;
      overflow: hidden;
    }

    .toast-progress {
      height: 100%;
      background: linear-gradient(90deg, var(--accent, #4ade80), var(--accent-light, #86efac));
      border-radius: 0 0 12px 0;
      transform-origin: left;
      animation: progressShrink var(--duration) linear forwards;
      box-shadow: 0 0 8px var(--glow, rgba(74, 222, 128, 0.4));
    }

    /* Category-specific colors with CSS variables */
    .toast.cat-default     { --accent: #4ade80; --accent-light: #86efac; --glow: rgba(74, 222, 128, 0.15); }
    .toast.cat-break       { --accent: #60a5fa; --accent-light: #93c5fd; --glow: rgba(96, 165, 250, 0.15); }
    .toast.cat-hydration   { --accent: #38bdf8; --accent-light: #7dd3fc; --glow: rgba(56, 189, 248, 0.15); }
    .toast.cat-posture     { --accent: #a78bfa; --accent-light: #c4b5fd; --glow: rgba(167, 139, 250, 0.15); }
    .toast.cat-eyestrain   { --accent: #f472b6; --accent-light: #f9a8d4; --glow: rgba(244, 114, 182, 0.15); }
    .toast.cat-fatigue     { --accent: #fbbf24; --accent-light: #fcd34d; --glow: rgba(251, 191, 36, 0.15); }
    .toast.cat-stuck       { --accent: #fb923c; --accent-light: #fdba74; --glow: rgba(251, 146, 60, 0.15); }
    .toast.cat-overwork    { --accent: #ef4444; --accent-light: #f87171; --glow: rgba(239, 68, 68, 0.15); }
    .toast.cat-achievement { --accent: #facc15; --accent-light: #fde047; --glow: rgba(250, 204, 21, 0.2); }
    .toast.cat-boundary    { --accent: #34d399; --accent-light: #6ee7b7; --glow: rgba(52, 211, 153, 0.15); }
    .toast.cat-work        { --accent: #818cf8; --accent-light: #a5b4fc; --glow: rgba(129, 140, 248, 0.15); }

    @keyframes toastSlideIn {
      from {
        opacity: 0;
        transform: translateX(40px) scale(0.92);
      }
      to {
        opacity: 1;
        transform: translateX(0) scale(1);
      }
    }

    @keyframes toastSlideOut {
      from {
        opacity: 1;
        transform: translateX(0) scale(1);
      }
      to {
        opacity: 0;
        transform: translateX(40px) scale(0.92);
      }
    }

    /* Slide from left for left-positioned toasts */
    #toast-container.position-left .toast {
      animation-name: toastSlideInLeft;
    }
    #toast-container.position-left .toast:hover {
      transform: translateX(4px);
    }
    #toast-container.position-left .toast.exit {
      animation-name: toastSlideOutLeft;
    }

    @keyframes toastSlideInLeft {
      from { opacity: 0; transform: translateX(-40px) scale(0.92); }
      to   { opacity: 1; transform: translateX(0) scale(1); }
    }
    @keyframes toastSlideOutLeft {
      from { opacity: 1; transform: translateX(0) scale(1); }
      to   { opacity: 0; transform: translateX(-40px) scale(0.92); }
    }

    @keyframes progressShrink {
      from { transform: scaleX(1); }
      to   { transform: scaleX(0); }
    }

    /* Achievement special styling */
    .toast.cat-achievement {
      background: linear-gradient(135deg, rgba(40, 35, 20, 0.95) 0%, rgba(30, 28, 18, 0.98) 100%);
      border-color: rgba(250, 204, 21, 0.3);
      border-left-color: #facc15;
    }

    .toast.cat-achievement .toast-icon {
      animation: achievementPulse 2s ease-in-out infinite;
    }

    @keyframes achievementPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
  </style>
</head>
<body>
  <div id="toast-container"></div>
  <script type="module" src="toast-window.js"></script>
</body>
</html>

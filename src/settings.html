<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DevPet Settings</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      background: #1e1e1e;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #e0e0e0;
      user-select: none;
      overflow: hidden;
    }

    .settings-shell {
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    /* --- Tab bar --- */
    .tab-bar {
      display: flex;
      background: #181818;
      border-bottom: 1px solid #333;
      flex-shrink: 0;
    }

    .tab-btn {
      flex: 1;
      padding: 10px 0;
      background: none;
      border: none;
      color: #888;
      font-size: 11px;
      font-family: inherit;
      cursor: pointer;
      text-align: center;
      transition: color 0.15s, border-color 0.15s;
      border-bottom: 2px solid transparent;
    }

    .tab-btn:hover {
      color: #ccc;
    }

    .tab-btn.active {
      color: #4ade80;
      border-bottom-color: #4ade80;
    }

    .tab-icon {
      display: block;
      font-size: 16px;
      margin-bottom: 2px;
    }

    /* --- Tab content area --- */
    .tab-body {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
    }

    .tab-panel {
      display: none;
    }

    .tab-panel.active {
      display: block;
    }

    /* --- Section labels inside panels --- */
    .section-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #4ade80;
      margin: 16px 0 8px;
    }

    .section-label:first-child {
      margin-top: 0;
    }

    /* --- Setting rows --- */
    .setting-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      font-size: 12px;
    }

    .setting-row label {
      color: #e0e0e0;
    }

    .setting-row select,
    .setting-row input[type="checkbox"] {
      background: #3a3a3a;
      border: 1px solid #555;
      color: white;
      padding: 4px 8px;
      border-radius: 4px;
    }

    .setting-row select:focus {
      outline: none;
      border-color: #4ade80;
    }

    /* --- Coding apps --- */
    .coding-apps-list {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-bottom: 8px;
    }

    .coding-app-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: #3a3a3a;
      border: 1px solid #555;
      border-radius: 12px;
      padding: 2px 8px;
      font-size: 11px;
      color: #e0e0e0;
    }

    .coding-app-tag button {
      background: none;
      border: none;
      color: #888;
      cursor: pointer;
      font-size: 13px;
      padding: 0;
      line-height: 1;
    }

    .coding-app-tag button:hover {
      color: #ef4444;
    }

    .coding-apps-add {
      display: flex;
      gap: 4px;
    }

    .coding-apps-add input {
      flex: 1;
      background: #3a3a3a;
      border: 1px solid #555;
      color: white;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 11px;
    }

    .coding-apps-add input:focus {
      outline: none;
      border-color: #4ade80;
    }

    .coding-apps-add button {
      background: #4ade80;
      color: black;
      border: none;
      border-radius: 4px;
      padding: 4px 10px;
      cursor: pointer;
      font-size: 11px;
      font-weight: bold;
    }

    .coding-apps-add button:hover {
      background: #22c55e;
    }

    /* --- Footer buttons --- */
    .setting-buttons {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      padding: 10px 20px;
      border-top: 1px solid #333;
      background: #181818;
      flex-shrink: 0;
    }

    .setting-buttons button {
      padding: 8px 20px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      transition: background 0.2s;
    }

    #settings-close {
      background: #3a3a3a;
      color: white;
    }

    #settings-close:hover {
      background: #555;
    }

    /* --- Scrollbar --- */
    .tab-body::-webkit-scrollbar { width: 6px; }
    .tab-body::-webkit-scrollbar-track { background: transparent; }
    .tab-body::-webkit-scrollbar-thumb { background: #555; border-radius: 3px; }
  </style>
</head>
<body>
  <div class="settings-shell">

    <!-- Tab bar -->
    <div class="tab-bar">
      <button class="tab-btn active" data-tab="timer">
        <span class="tab-icon">&#9201;</span>Timer
      </button>
      <button class="tab-btn" data-tab="wellness">
        <span class="tab-icon">&#9829;</span>Wellness
      </button>
      <button class="tab-btn" data-tab="companion">
        <span class="tab-icon">&#9733;</span>Companion
      </button>
      <button class="tab-btn" data-tab="appearance">
        <span class="tab-icon">&#9998;</span>Appearance
      </button>
    </div>

    <!-- Scrollable tab content -->
    <div class="tab-body">

      <!-- ======== TIMER ======== -->
      <div id="panel-timer" class="tab-panel active">
        <div class="section-label">Work &amp; Breaks</div>
        <div class="setting-row">
          <label for="work-interval">Work Interval (min):</label>
          <select id="work-interval">
            <option value="1">1</option>
            <option value="2" selected>2</option>
            <option value="5">5</option>
            <option value="15">15</option>
            <option value="25">25</option>
          </select>
        </div>
        <div class="setting-row">
          <label for="break-interval">Break Interval (min):</label>
          <select id="break-interval">
            <option value="1" selected>1</option>
            <option value="2">2</option>
            <option value="5">5</option>
            <option value="10">10</option>
          </select>
        </div>
        <div class="setting-row">
          <label for="break-mode">Break Mode:</label>
          <select id="break-mode">
            <option value="pomodoro" selected>Pomodoro</option>
            <option value="smart">Smart</option>
            <option value="manual">Manual</option>
          </select>
        </div>
        <div class="setting-row" id="idle-threshold-row">
          <label for="idle-threshold">Idle Threshold (min):</label>
          <select id="idle-threshold">
            <option value="3">3</option>
            <option value="5" selected>5</option>
            <option value="10">10</option>
            <option value="15">15</option>
          </select>
        </div>

        <div class="section-label">Long Breaks</div>
        <div class="setting-row">
          <label for="long-break-interval">Long Break Every:</label>
          <select id="long-break-interval">
            <option value="3">3 cycles</option>
            <option value="4" selected>4 cycles</option>
            <option value="5">5 cycles</option>
            <option value="6">6 cycles</option>
          </select>
        </div>
        <div class="setting-row">
          <label for="long-break-minutes">Long Break (min):</label>
          <select id="long-break-minutes">
            <option value="10">10</option>
            <option value="15" selected>15</option>
            <option value="20">20</option>
            <option value="30">30</option>
          </select>
        </div>

        <div class="section-label">Focus Mode</div>
        <div class="setting-row">
          <label for="focus-duration">Focus Duration (min):</label>
          <select id="focus-duration">
            <option value="15">15</option>
            <option value="25" selected>25</option>
            <option value="45">45</option>
            <option value="60">60</option>
            <option value="90">90</option>
            <option value="120">120</option>
          </select>
        </div>
      </div>

      <!-- ======== WELLNESS ======== -->
      <div id="panel-wellness" class="tab-panel">
        <div class="section-label">Eye Care</div>
        <div class="setting-row">
          <label for="eye-strain-enabled">20-20-20 Reminders:</label>
          <input type="checkbox" id="eye-strain-enabled" checked>
        </div>

        <div class="section-label">Posture</div>
        <div class="setting-row">
          <label for="posture-enabled">Posture Reminders:</label>
          <input type="checkbox" id="posture-enabled" checked>
        </div>
        <div class="setting-row" id="posture-frequency-row">
          <label for="posture-frequency">Remind Every (min):</label>
          <select id="posture-frequency">
            <option value="15">15</option>
            <option value="30" selected>30</option>
            <option value="45">45</option>
            <option value="60">60</option>
          </select>
        </div>

        <div class="section-label">Hydration</div>
        <div class="setting-row">
          <label for="hydration-enabled">Water Reminders:</label>
          <input type="checkbox" id="hydration-enabled" checked>
        </div>
        <div class="setting-row">
          <label for="hydration-frequency">Remind Every (min):</label>
          <select id="hydration-frequency">
            <option value="30">30</option>
            <option value="45" selected>45</option>
            <option value="60">60</option>
            <option value="90">90</option>
          </select>
        </div>

        <div class="section-label">Overwork</div>
        <div class="setting-row">
          <label for="overwork-prevention">Daily Hour Warnings:</label>
          <input type="checkbox" id="overwork-prevention" checked>
        </div>
        <div class="setting-row">
          <label for="boundary-awareness">Work-Life Reminders:</label>
          <input type="checkbox" id="boundary-awareness" checked>
        </div>
      </div>

      <!-- ======== COMPANION ======== -->
      <div id="panel-companion" class="tab-panel">
        <div class="section-label">Notifications</div>
        <div class="setting-row">
          <label for="notifications">Notifications:</label>
          <input type="checkbox" id="notifications" checked>
        </div>
        <div class="setting-row">
          <label for="notification-position">Position:</label>
          <select id="notification-position">
            <option value="top-left">Top Left</option>
            <option value="top-center">Top Center</option>
            <option value="top-right">Top Right</option>
            <option value="bottom-left">Bottom Left</option>
            <option value="bottom-center">Bottom Center</option>
            <option value="bottom-right" selected>Bottom Right</option>
          </select>
        </div>
        <div class="setting-row">
          <label for="popup-duration">Duration (sec):</label>
          <select id="popup-duration">
            <option value="3">3</option>
            <option value="5">5</option>
            <option value="10">10</option>
            <option value="15">15</option>
            <option value="20" selected>20</option>
            <option value="30">30</option>
          </select>
        </div>

        <div class="section-label">Notification Categories</div>
        <div class="setting-row">
          <label for="notify-breaks">Breaks:</label>
          <input type="checkbox" id="notify-breaks" checked>
        </div>
        <div class="setting-row">
          <label for="notify-hydration">Hydration:</label>
          <input type="checkbox" id="notify-hydration" checked>
        </div>
        <div class="setting-row">
          <label for="notify-posture">Posture:</label>
          <input type="checkbox" id="notify-posture" checked>
        </div>
        <div class="setting-row">
          <label for="notify-eyestrain">Eye Strain:</label>
          <input type="checkbox" id="notify-eyestrain" checked>
        </div>
        <div class="setting-row">
          <label for="notify-fatigue">Fatigue:</label>
          <input type="checkbox" id="notify-fatigue" checked>
        </div>
        <div class="setting-row">
          <label for="notify-stuck">Stuck Detection:</label>
          <input type="checkbox" id="notify-stuck" checked>
        </div>
        <div class="setting-row">
          <label for="notify-overwork">Overwork:</label>
          <input type="checkbox" id="notify-overwork" checked>
        </div>
        <div class="setting-row">
          <label for="notify-achievements">Achievements:</label>
          <input type="checkbox" id="notify-achievements" checked>
        </div>
        <div class="setting-row">
          <label for="notify-boundary">Work-Life Balance:</label>
          <input type="checkbox" id="notify-boundary" checked>
        </div>

        <div class="section-label">Encouragement</div>
        <div class="setting-row">
          <label for="encouragement-enabled">Celebrate Wins:</label>
          <input type="checkbox" id="encouragement-enabled" checked>
        </div>
        <div class="setting-row" id="encouragement-frequency-row">
          <label for="encouragement-frequency">Min. Interval (min):</label>
          <select id="encouragement-frequency">
            <option value="30">30</option>
            <option value="60" selected>60</option>
            <option value="90">90</option>
            <option value="120">120</option>
          </select>
        </div>
        <div class="setting-row">
          <label for="resume-suggestions">Resume Suggestions:</label>
          <input type="checkbox" id="resume-suggestions" checked>
        </div>

        <div class="section-label">Intelligence</div>
        <div class="setting-row">
          <label for="fatigue-detection">Fatigue Detection:</label>
          <input type="checkbox" id="fatigue-detection" checked>
        </div>
        <div class="setting-row">
          <label for="stuck-detection">Stuck Detection:</label>
          <input type="checkbox" id="stuck-detection" checked>
        </div>

        <div class="section-label">Learning</div>
        <div class="setting-row">
          <label for="learning-resources">Learning Resources:</label>
          <input type="checkbox" id="learning-resources">
        </div>

        <div class="section-label">Sound</div>
        <div class="setting-row">
          <label for="sound-reactions-enabled">Reaction Sounds:</label>
          <input type="checkbox" id="sound-reactions-enabled">
        </div>
        <div class="setting-row">
          <label for="sound-talk-enabled">Talking Sounds:</label>
          <input type="checkbox" id="sound-talk-enabled">
        </div>
        <div class="setting-row" id="sound-volume-row">
          <label for="sound-volume">Volume:</label>
          <select id="sound-volume">
            <option value="10">10%</option>
            <option value="25">25%</option>
            <option value="50" selected>50%</option>
            <option value="75">75%</option>
            <option value="100">100%</option>
          </select>
        </div>
        <div class="setting-row" id="sound-talk-voice-row">
          <label for="sound-talk-voice">Voice Style:</label>
          <select id="sound-talk-voice">
            <option value="mumble" selected>Mumble</option>
            <option value="squeaky">Squeaky</option>
            <option value="gruff">Gruff</option>
            <option value="alien">Alien</option>
            <option value="robot">Robot</option>
            <option value="mystic">Mystic</option>
            <option value="hyper">Hyper</option>
            <option value="retro">Retro</option>
          </select>
        </div>
      </div>

      <!-- ======== APPEARANCE ======== -->
      <div id="panel-appearance" class="tab-panel">
        <div class="section-label">Character</div>
        <div class="setting-row">
          <label for="selected-skin">Character Skin:</label>
          <select id="selected-skin">
            <!-- Populated dynamically from skins directory -->
          </select>
        </div>
        <div class="setting-row" id="skin-tone-row">
          <label for="skin-tone">Skin Tone:</label>
          <select id="skin-tone">
            <!-- Populated dynamically based on selected skin -->
          </select>
        </div>
        <div class="setting-row">
          <label for="click-through-ghost">Ghost on Hover:</label>
          <input type="checkbox" id="click-through-ghost" checked>
        </div>

        <div class="section-label">Movement</div>
        <div class="setting-row">
          <label for="walking-enabled">Walking:</label>
          <input type="checkbox" id="walking-enabled" checked>
        </div>
        <div class="setting-row" id="walking-bound-left-row">
          <label for="walking-bound-left">Left Margin (%):</label>
          <select id="walking-bound-left">
            <option value="0" selected>0 (edge)</option>
            <option value="10">10</option>
            <option value="20">20</option>
            <option value="30">30</option>
            <option value="40">40</option>
          </select>
        </div>
        <div class="setting-row" id="walking-bound-right-row">
          <label for="walking-bound-right">Right Margin (%):</label>
          <select id="walking-bound-right">
            <option value="0" selected>0 (edge)</option>
            <option value="10">10</option>
            <option value="20">20</option>
            <option value="30">30</option>
            <option value="40">40</option>
          </select>
        </div>

        <div class="section-label">Coding Apps</div>
        <div id="coding-apps-list" class="coding-apps-list"></div>
        <div class="coding-apps-add">
          <input type="text" id="coding-app-input" placeholder="Add app name...">
          <button id="coding-app-add-btn">Add</button>
        </div>
      </div>

    </div><!-- /tab-body -->

    <!-- Footer -->
    <div class="setting-buttons">
      <button id="settings-close">Close</button>
    </div>

  </div><!-- /settings-shell -->

  <script type="module" src="settings-page.js"></script>
</body>
</html>

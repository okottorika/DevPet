<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Today's Wins</title>
  <link rel="stylesheet" href="panel-common.css">
  <style>
    body {
      user-select: none;
      text-align: center;
    }

    h3 {
      font-size: 15px;
      color: #4ade80;
      margin-bottom: 8px;
    }

    .today-wins-message {
      font-size: 12px;
      color: #4ade80;
      line-height: 1.4;
      margin-bottom: 12px;
      font-style: italic;
    }

    /* Stats row */
    .today-wins-stats {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .today-wins-stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 8px 12px;
      background: rgba(50, 50, 50, 0.6);
      border-radius: 6px;
      border: 1px solid #3a3a3a;
      min-width: 60px;
    }

    .today-wins-stat-value {
      font-size: 18px;
      font-weight: bold;
      color: #4ade80;
      font-variant-numeric: tabular-nums;
    }

    .today-wins-stat-label {
      font-size: 8px;
      color: #808080;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 2px;
    }

    /* Project */
    .today-wins-project {
      font-size: 9px;
      color: #a0a0a0;
      margin-bottom: 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Sub-encouragement */
    .today-wins-encouragement {
      font-size: 9px;
      color: #808080;
      line-height: 1.3;
      margin-bottom: 12px;
      border-top: 1px solid #3a3a3a;
      padding-top: 8px;
    }

    /* Buttons */
    .today-wins-buttons {
      display: flex;
      gap: 6px;
      justify-content: center;
    }

    .today-wins-buttons button {
      padding: 6px 12px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
      transition: background 0.2s, color 0.2s;
    }

    .today-wins-btn-done {
      background: #4ade80;
      color: black;
      font-weight: bold;
    }

    .today-wins-btn-done:hover {
      background: #22c55e;
    }

    .today-wins-btn-copy {
      background: rgba(96, 165, 250, 0.15);
      color: #60a5fa;
      border: 1px solid rgba(96, 165, 250, 0.3) !important;
    }

    .today-wins-btn-copy:hover {
      background: rgba(96, 165, 250, 0.25);
    }

    .today-wins-btn-copy.copied {
      background: rgba(74, 222, 128, 0.15);
      color: #4ade80;
      border-color: rgba(74, 222, 128, 0.3) !important;
    }

    .today-wins-btn-continue {
      background: #3a3a3a;
      color: white;
    }

    .today-wins-btn-continue:hover {
      background: #555;
    }
  </style>
</head>
<body style="background:#1e1e1e">
  <h3 id="today-wins-title">Today's Wins</h3>
  <div id="today-wins-message" class="today-wins-message"></div>

  <div class="today-wins-stats">
    <div class="today-wins-stat">
      <span class="today-wins-stat-value" id="today-wins-time">0m</span>
      <span class="today-wins-stat-label">coding</span>
    </div>
    <div class="today-wins-stat">
      <span class="today-wins-stat-value" id="today-wins-files">0</span>
      <span class="today-wins-stat-label">files</span>
    </div>
    <div class="today-wins-stat">
      <span class="today-wins-stat-value" id="today-wins-streak">0</span>
      <span class="today-wins-stat-label">day streak</span>
    </div>
  </div>

  <div id="today-wins-project" class="today-wins-project"></div>
  <div id="today-wins-encouragement" class="today-wins-encouragement"></div>

  <div class="today-wins-buttons">
    <button id="today-wins-done" class="today-wins-btn-done">See you tomorrow!</button>
    <button id="today-wins-copy" class="today-wins-btn-copy">Copy</button>
    <button id="today-wins-continue" class="today-wins-btn-continue">Keep going!</button>
  </div>

  <script type="module" src="today-wins-page.js"></script>
</body>
</html>
